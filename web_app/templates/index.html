<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuclear Outage Viewer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .loading-overlay { display: none; }
        .is-loading .loading-overlay { display: block; }
    </style>
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>☢️ Reporte de Outages Nucleares</h1>
        <button id="refreshBtn" class="btn btn-primary">
            Refresh
        </button>
    </div>

    {% if error %}
    <div class="alert alert-danger" role="alert">
        <strong>Error:</strong> {{ error }}
    </div>
    {% endif %}

    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <form method="get" action="/" class="row g-3 align-items-end">
                <div class="col-md-4">
                    <label class="form-label fw-bold">Seleccionar Planta</label>
                    <select name="facility_id" class="form-select">
                        <option value="">-- Todas las plantas --</option>
                        {% for fac in facilities %}
                            <option value="{{ fac.id }}" 
                                {% if fac.id|string == selected_facility|string %}selected{% endif %}>
                                {{ fac.name }} (ID: {{ fac.id }})
                            </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-bold">Start</label>
                    <input type="date" name="start_date" class="form-control" value="{{ start_date or '' }}">
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-bold">End</label>
                    <input type="date" name="end_date" class="form-control" value="{{ end_date or '' }}">
                </div>
                <div class="col-md-3 d-flex gap-2">
                    <button type="submit" class="btn btn-dark flex-grow-1">Filtrar</button>
                    <a href="/" class="btn btn-outline-secondary">Limpiar</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    const refreshBtn = document.getElementById('refreshBtn');
    
    refreshBtn.addEventListener('click', async () => {
        refreshBtn.disabled = true;
        refreshBtn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Actualizando...';

        try {
            const response = await fetch('/trigger-refresh');
            const result = await response.json();
            
            if (result.status === 'success') {
                alert('¡Datos actualizados con éxito!');
                location.reload(); 
            } else {
                alert('Error al actualizar: ' + result.message);
            }
        } catch (err) {
            alert('Error de conexión con el servidor web.');
        } finally {
            refreshBtn.disabled = false;
            refreshBtn.innerHTML = 'Actualizar Datos';
        }
    });
</script>

</body>
</html>
